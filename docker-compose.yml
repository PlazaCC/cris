services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - cms-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10

  cms:
    build:
      context: .
      dockerfile: clients/cms/Dockerfile
      target: prod
    image: cris-cms:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: ${HOST}
      PORT: ${PORT}
      DATABASE_CLIENT: ${DATABASE_CLIENT}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      APP_KEYS: ${APP_KEYS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - '1337:1337'
    volumes:
      - cms-uploads:/opt/clients/cms/public/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: clients/web/Dockerfile
      args:
        VITE_STRAPI_API_URL: ${VITE_STRAPI_API_URL}
        VITE_STRAPI_API_TOKEN: ${VITE_STRAPI_API_TOKEN}
        VITE_DEV_MODE: 'false'
    image: cris-web:latest
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - cms

volumes:
  cms-db:
  cms-uploads:
